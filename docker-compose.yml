version: "3.9"

# CampusMart Docker Compose Configuration
# This configuration sets up:
# - PHP-FPM Application Server (port 8000)
# - MySQL Database (port 3306)
# - Persistent Database Volume

services:
  # PHP-FPM Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campusmart_app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      # Laravel Configuration
      APP_NAME: "CampusMart"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      
      # Database Configuration
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: campusmart
      DB_USERNAME: campusmart_user
      DB_PASSWORD: campusmart_pass
      
      # Cache & Session
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_DRIVER: sync
    ports:
      - "8000:8000"
    volumes:
      - ./:/var/www/html
      - ./storage/logs:/var/www/html/storage/logs
    depends_on:
      - db
    networks:
      - campusmart_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: >
      sh -c "
        php artisan migrate --force 2>/dev/null || true &&
        php artisan db:seed --force 2>/dev/null || true &&
        php artisan serve --host=0.0.0.0 --port=8000
      "

  # MySQL Database Server
  db:
    image: mysql:8.0
    container_name: campusmart_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: campusmart
      MYSQL_USER: campusmart_user
      MYSQL_PASSWORD: campusmart_pass
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/sql:/docker-entrypoint-initdb.d:ro
    networks:
      - campusmart_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

# Persistent Volumes
volumes:
  db_data:
    driver: local

# Docker Networks
networks:
  campusmart_network:
    driver: bridge